name = "binturong-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://sfqowvpuzsqgmwlecgdx.supabase.co"

# Secrets (set via CLI, not in this file):
# wrangler secret put SUPABASE_SERVICE_KEY
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put GROK_MAIN_API_KEY
# wrangler secret put GROK_SUB_API_KEY
# wrangler secret put FRED_API_KEY
# Optional:
# wrangler secret put MAIN_AGENT_SYSTEM_PROMPT
# wrangler secret put SUB_AGENT_SYSTEM_PROMPT

[[queues.producers]]
binding = "AGENT_RUNS_QUEUE"
queue = "agent-runs"

[[queues.consumers]]
queue = "agent-runs"
