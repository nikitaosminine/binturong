name = "binturong-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"
compatibility_flags = ["nodejs_compat"]

[vars]
SUPABASE_URL = "https://sfqowvpuzsqgmwlecgdx.supabase.co"

# Secrets (set via CLI, not in this file):
# wrangler secret put SUPABASE_SERVICE_KEY
# wrangler secret put SUPABASE_ANON_KEY
# wrangler secret put GROK_MAIN_API_KEY
# wrangler secret put GROK_SUB_API_KEY
# wrangler secret put GROK_NORMALIZATION_API_KEY
# wrangler secret put FRED_API_KEY
# Optional:
# wrangler secret put MAIN_AGENT_SYSTEM_PROMPT
# wrangler secret put SUB_AGENT_SYSTEM_PROMPT
# wrangler secret put SUB_AGENT_PLANNING_SYSTEM_PROMPT
# wrangler secret put GROK_WEB_SEARCH_MODEL

[[queues.producers]]
binding = "AGENT_RUNS_QUEUE"
queue = "agent-runs"

[[queues.producers]]
binding = "SNAPSHOT_QUEUE"
queue = "snapshot-rebuild-queue"

[[queues.consumers]]
queue = "agent-runs"

[[queues.consumers]]
queue = "snapshot-rebuild-queue"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "snapshot-rebuild-dlq"

[triggers]
# Hourly cron for scheduled fanout. Actual per-portfolio run times are selected
# in code based on user timezone + effective runs/day setting.
crons = [
  "5 * * * *",
  "30 6 * * 2-6",
  "30 16 * * 1-5",
  "30 17 * * 1-5",
  "0 21 * * 1-5",
]
